[pytest]
# La racine du dépôt doit être importable (terminal.py + package vertex/),
# quelle que soit l'invocation : `pytest -q`, `pytest tests/x.py`, ou
# `python -m pytest`. Sans ceci, le job CI « safety » (pytest console,
# CWD absent de sys.path) échouait à importer vertex.
pythonpath = .
testpaths = tests
